version: "3.9"

services:
  telegram-bot:
    image: node:20
    container_name: vala-telegram-bot
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./app:/app
      - /docker/openclaw-k6ya/data:/data
    env_file:
      - .env
    command: >
      sh -c "npm install node-telegram-bot-api &&
             node bot.js"
    networks:
      - openclaw_net

networks:
  openclaw_net:
    external: true
    name: openclaw-k6ya_default
