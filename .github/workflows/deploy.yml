name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 72.60.231.42
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /docker/vala-telegram-bot
            docker compose pull
            docker compose up -d